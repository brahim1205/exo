<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Année académique — GestionSchool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="page-wrapper">

    <div class="form-wrapper" style="max-width:820px;">
        <a class="btn btn-ghost btn-sm" th:href="@{/annees}" style="margin-bottom:16px;display:inline-flex;">
            <i class="fa-solid fa-arrow-left"></i> Retour
        </a>

        <div class="card">
            <div class="card-header">
                <div>
                    <h2 class="card-title" th:text="${annee.id == null ? 'Nouvelle annee academique' : 'Modifier annee academique'}">Année</h2>
                    <p class="text-muted text-small" style="margin-top:3px;">Définissez le calendrier de l'année académique</p>
                </div>
                <i class="fa-solid fa-calendar-days" style="font-size:20px;color:#94a3b8;"></i>
            </div>
            <div class="card-body">
                <form th:action="@{/annees}" th:object="${annee}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label class="form-label">Code</label>
                        <div class="field-readonly">
                            <span class="auto-badge">Auto</span>
                            <span th:text="${annee.code != null ? annee.code : 'Sera généré automatiquement'}">—</span>
                        </div>
                    </div>

                    <p class="form-section-title">Calendrier</p>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="dateOuverture">Date d'ouverture</label>
                            <input type="date" th:field="*{dateOuverture}" class="form-control" id="dateOuverture">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="dateFermeture">Date de fermeture</label>
                            <input type="date" th:field="*{dateFermeture}" class="form-control" id="dateFermeture">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="dateDebutInscription">Début des inscriptions</label>
                            <input type="date" th:field="*{dateDebutInscription}" class="form-control" id="dateDebutInscription">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="dateFinInscription">Fin des inscriptions</label>
                            <input type="date" th:field="*{dateFinInscription}" class="form-control" id="dateFinInscription">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="statut">Statut initial</label>
                        <select th:field="*{statut}" class="form-control" id="statut">
                            <option th:each="s : ${T(com.gestionSchool.model.StatutAnneeAcademique).values()}"
                                    th:value="${s}" th:text="${s}">STATUT</option>
                        </select>
                        <p class="form-hint">Le statut peut être changé via les actions dans la liste.</p>
                    </div>

                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit">
                            <i class="fa-solid fa-floppy-disk"></i> Enregistrer
                        </button>
                        <a class="btn btn-outline" th:href="@{/annees}">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
