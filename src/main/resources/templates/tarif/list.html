<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tarifs — GestionSchool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .tarif-total {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .tarif-total i { font-size: 10px; color: var(--success); }
    </style>
</head>
<body class="page-wrapper">

    <!-- Banner -->
    <div class="page-banner">
        <div style="display:flex;align-items:center;">
            <div class="page-banner-icon"><i class="fa-solid fa-coins"></i></div>
            <div class="page-banner-left">
                <h1 class="page-title">Tarifs</h1>
                <p class="page-subtitle">Configurez les mensualités et frais par classe</p>
            </div>
        </div>
        <div class="page-header-right">
            <a class="btn btn-primary" th:href="@{/tarifs/new}">
                <i class="fa-solid fa-plus"></i> Nouveau tarif
            </a>
        </div>
    </div>

    <!-- Summary strip -->
    <div class="summary-strip">
        <div class="summary-item">
            <div class="summary-icon" style="background:var(--danger-subtle);color:var(--danger);">
                <i class="fa-solid fa-coins"></i>
            </div>
            <div>
                <div class="summary-val" th:text="${#lists.size(tarifs)}">0</div>
                <div class="summary-label">Tarifs publiés</div>
            </div>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success" role="alert">
        <i class="fa-solid fa-circle-check"></i>
        <span th:text="${message}">Message</span>
    </div>

    <div th:if="${not #lists.isEmpty(tarifs)}">
        <!-- Toolbar -->
        <div class="table-toolbar">
            <div class="toolbar-left">
                <div class="search-box">
                    <span class="search-box-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="searchInput" placeholder="Rechercher un tarif…">
                </div>
            </div>
            <div class="toolbar-right">
                <span class="record-badge">
                    <i class="fa-solid fa-list"></i>
                    <strong th:text="${#lists.size(tarifs)}">0</strong> enregistrements
                </span>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Classe</th>
                        <th>Mensualité</th>
                        <th>Autres frais</th>
                        <th style="width:90px;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tarif : ${tarifs}">
                        <td>
                            <div class="info-cell">
                                <div class="avatar" style="width:32px;height:32px;font-size:12px;background:linear-gradient(135deg,#fb923c,#ea580c);">
                                    <i class="fa-solid fa-school" style="font-size:12px;"></i>
                                </div>
                                <div class="info-cell-primary" th:text="${tarif.classe != null ? tarif.classe.nom : '—'}">Classe</div>
                            </div>
                        </td>
                        <td>
                            <div class="amount-primary" th:text="${#numbers.formatInteger(tarif.mensualite, 0, 'DEFAULT') + ' FCFA'}">0 FCFA</div>
                            <div class="tarif-total"><i class="fa-solid fa-circle-check"></i> mensualité</div>
                        </td>
                        <td>
                            <div class="amount-primary" th:text="${#numbers.formatInteger(tarif.autresFrais, 0, 'DEFAULT') + ' FCFA'}">0 FCFA</div>
                            <div class="tarif-total"><i class="fa-solid fa-circle-dot"></i> frais annexes</div>
                        </td>
                        <td>
                            <div class="table-actions">
                                <a class="btn-action edit" title="Modifier" th:href="@{/tarifs/{id}/edit(id=${tarif.id})}">
                                    <i class="fa-solid fa-pen"></i>
                                </a>
                                <form th:action="@{/tarifs/{id}/delete(id=${tarif.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn-action delete" title="Supprimer"
                                            onclick="return confirm('Êtes-vous sûr de vouloir supprimer ce tarif ?')">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card" th:if="${#lists.isEmpty(tarifs)}">
        <div class="empty-state">
            <div class="empty-state-icon"><i class="fa-solid fa-coins"></i></div>
            <h2 class="empty-state-title">Aucun tarif configuré</h2>
            <p class="empty-state-desc">Commencez par définir un tarif pour une classe.</p>
            <a class="btn btn-primary" th:href="@{/tarifs/new}">
                <i class="fa-solid fa-plus"></i> Créer un tarif
            </a>
        </div>
    </div>

    <script>
        document.getElementById('searchInput')?.addEventListener('input', function () {
            const q = this.value.toLowerCase();
            document.querySelectorAll('tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
