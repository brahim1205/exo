<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tarif — GestionSchool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="page-wrapper">

    <div class="form-wrapper">
        <a class="btn btn-ghost btn-sm" th:href="@{/tarifs}" style="margin-bottom:16px;display:inline-flex;">
            <i class="fa-solid fa-arrow-left"></i> Retour
        </a>

        <div class="card">
            <div class="card-header">
                <div>
                    <h2 class="card-title" th:text="${tarif.id == null ? 'Nouveau tarif' : 'Modifier le tarif'}">Tarif</h2>
                    <p class="text-muted text-small" style="margin-top:3px;">Définissez les frais de scolarité pour une classe</p>
                </div>
                <i class="fa-solid fa-coins" style="font-size:20px;color:#94a3b8;"></i>
            </div>
            <div class="card-body">
                <form th:action="@{/tarifs}" th:object="${tarif}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label class="form-label" for="classeId">Classe <span style="color:#ef4444;">*</span></label>
                        <select th:field="*{classe.id}" class="form-control" id="classeId">
                            <option value="">— Sélectionner une classe —</option>
                            <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.nom}">Classe</option>
                        </select>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" for="mensualite">Mensualité (FCFA) <span style="color:#ef4444;">*</span></label>
                            <input type="number" step="0.01" min="0" th:field="*{mensualite}"
                                   class="form-control" id="mensualite" placeholder="Ex : 25000">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="autresFrais">Autres frais (FCFA)</label>
                            <input type="number" step="0.01" min="0" th:field="*{autresFrais}"
                                   class="form-control" id="autresFrais" placeholder="Ex : 5000">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit">
                            <i class="fa-solid fa-floppy-disk"></i> Enregistrer
                        </button>
                        <a class="btn btn-outline" th:href="@{/tarifs}">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
