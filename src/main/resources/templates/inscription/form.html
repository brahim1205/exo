<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nouvelle inscription — GestionSchool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <script>
        function toggleStudentType() {
            const mode = document.querySelector('input[name="etudiantMode"]:checked').value;
            document.getElementById('existingStudentBlock').style.display = mode === 'ancien' ? 'block' : 'none';
            document.getElementById('newStudentBlock').style.display = mode === 'nouveau' ? 'block' : 'none';
        }

        function previewImage(input) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
                return;
            }

            preview.removeAttribute('src');
            preview.style.display = 'none';
            placeholder.style.display = 'flex';
        }

        function validateForm() {
            const mode = document.querySelector('input[name="etudiantMode"]:checked').value;
            
            if (mode === 'ancien') {
                const etudiantId = document.querySelector('select[name="etudiantId"]').value;
                if (!etudiantId) {
                    alert('Veuillez sélectionner un étudiant existant.');
                    return false;
                }
            } else {
                const nom = document.querySelector('input[name="newNom"]').value;
                const prenom = document.querySelector('input[name="newPrenom"]').value;
                const date_naissance = document.querySelector('input[name="newDate_naissance"]').value;
                
                if (!nom || !prenom || !date_naissance) {
                    alert('Veuillez remplir tous les champs obligatoires pour le nouvel étudiant.');
                    return false;
                }
            }

            const classeId = document.querySelector('select[name="classeId"]').value;
            const anneeId = document.querySelector('select[name="anneeId"]').value;

            if (!classeId || !anneeId) {
                alert('Veuillez sélectionner la classe et l\'année académique.');
                return false;
            }

            return true;
        }
    </script>
    <style>
        .photo-upload-preview {
            margin-top: 16px;
            border: 1px solid #d6d3d1;
            border-radius: 18px;
            padding: 18px;
            background: linear-gradient(180deg, #fffdf8, #f8f3ea);
        }

        .photo-upload-title {
            margin: 0 0 12px;
            font-size: 14px;
            font-weight: 700;
            color: #92400e;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .photo-drop-zone {
            width: 180px;
            height: 230px;
            border: 2px solid #44403c;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .photo-drop-zone img {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .photo-drop-zone span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 34px;
            font-weight: 700;
            color: #292524;
        }
    </style>
</head>
<body class="page-wrapper">
    <div class="form-wrapper" style="max-width:750px;">
        <div th:if="${error}" class="alert alert-error" style="margin-bottom:16px;padding:14px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;">
            <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}">Erreur</span>
        </div>
        <div th:if="${message}" class="alert alert-success" style="margin-bottom:16px;padding:14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;color:#16a34a;">
            <i class="fa-solid fa-circle-check"></i> <span th:text="${message}">Succès</span>
        </div>
        
        <a class="btn btn-ghost btn-sm" th:href="@{/inscriptions}" style="margin-bottom:16px;display:inline-flex;">
            <i class="fa-solid fa-arrow-left"></i> Retour
        </a>

        <div class="card">
            <div class="card-header">
                <div>
                    <h2 class="card-title" th:text="${inscription != null and inscription.id != null ? 'Modifier l''inscription' : 'Nouvelle inscription'}">Nouvelle inscription</h2>
                    <p class="text-muted text-small">Sélectionnez l'étudiant, la classe et l'année académique</p>
                </div>
                <i class="fa-solid fa-file-signature" style="font-size:20px;color:#94a3b8;"></i>
            </div>
            <div class="card-body">
                <form th:action="@{/inscriptions}" method="post" enctype="multipart/form-data" onsubmit="return validateForm()">
                    <input type="hidden" name="id" th:if="${inscription != null and inscription.id != null}" th:value="${inscription.id}">
                    <div style="margin-bottom:20px;">
                        <label class="form-label">Type d'étudiant</label>
                        <div style="display:flex;gap:16px;">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <input type="radio" name="etudiantMode" value="ancien" th:checked="${etudiantMode == 'ancien'}" onclick="toggleStudentType()">
                                <span>Étudiant existant</span>
                            </label>
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <input type="radio" name="etudiantMode" value="nouveau" th:checked="${etudiantMode == 'nouveau'}" onclick="toggleStudentType()">
                                <span>Nouvel étudiant</span>
                            </label>
                        </div>
                    </div>

                    <div id="existingStudentBlock" th:style="${etudiantMode == 'ancien'} ? 'display:block;' : 'display:none;'">
                        <div class="form-group">
                            <label class="form-label">Étudiant <span style="color:#ef4444;">*</span></label>
                            <select name="etudiantId" class="form-control">
                                <option value="">-- Sélectionner un étudiant --</option>
                                <option th:each="e : ${etudiants}"
                                        th:value="${e.id}"
                                        th:selected="${inscription != null and inscription.etudiant != null and inscription.etudiant.id == e.id}"
                                        th:text="${e.nom} + ' ' + ${e.prenom} + ' (' + ${e.matricule} + ')'"></option>
                            </select>
                        </div>
                    </div>

                    <div id="newStudentBlock" th:style="${etudiantMode == 'nouveau'} ? 'display:block;' : 'display:none;'">
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Nom <span style="color:#ef4444;">*</span></label>
                                <input type="text" name="newNom" class="form-control" placeholder="Nom">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Prénom <span style="color:#ef4444;">*</span></label>
                                <input type="text" name="newPrenom" class="form-control" placeholder="Prénom">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Date de naissance <span style="color:#ef4444;">*</span></label>
                                <input type="date" name="newDate_naissance" class="form-control">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Adresse</label>
                                <input type="text" name="newAdresse" class="form-control" placeholder="Adresse">
                            </div>
                        </div>
                        <div class="form-group" style="margin-top:16px;">
                            <label class="form-label">Photo de l'étudiant</label>
                            <input type="file" name="photoFile" class="form-control" accept="image/*" onchange="previewImage(this)">
                            <div class="photo-upload-preview">
                                <p class="photo-upload-title">Aperçu dans le cadre de la fiche</p>
                                <div class="photo-drop-zone">
                                    <img id="imagePreview" alt="Aperçu de la photo">
                                    <span id="imagePlaceholder">PHOTO</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr style="margin:20px 0;border:none;border-top:1px solid #e2e8f0;">

                    <div class="form-group">
                        <label class="form-label">Classe <span style="color:#ef4444;">*</span></label>
                        <select name="classeId" class="form-control">
                            <option value="">-- Sélectionner une classe --</option>
                            <option th:each="c : ${classes}"
                                    th:value="${c.id}"
                                    th:selected="${inscription != null and inscription.classe != null and inscription.classe.id == c.id}"
                                    th:text="${c.nom} + ' (' + ${c.code} + ')'"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Année académique <span style="color:#ef4444;">*</span></label>
                        <select name="anneeId" class="form-control">
                            <option value="">-- Sélectionner une année --</option>
                            <option th:each="a : ${annees}"
                                    th:value="${a.id}"
                                    th:selected="${inscription != null and inscription.anneeAcademique != null and inscription.anneeAcademique.id == a.id}"
                                    th:text="${a.code}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">
                            <i class="fa-solid fa-save"></i>
                            <span th:text="${inscription != null and inscription.id != null ? 'Mettre à jour l''inscription' : 'Enregistrer l''inscription'}">Enregistrer l'inscription</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
